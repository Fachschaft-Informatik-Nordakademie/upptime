name: Deploy to avocado

on:
  workflow_run:
    workflows: ["Static Site CI"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy status page to avocado
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v5
        with:
          ref: gh-pages
          fetch-depth: 1

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 204.168.143.138 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync files to avocado
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude '.github' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ \
            service@204.168.143.138:/var/www/status/

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
